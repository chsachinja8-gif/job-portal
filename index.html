<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Job Portal</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <a href="https://chsachinja8-gif.github.io/portfolio/"><button> home </button></a>
  <h2>Job Portal</h2>
  <button onclick="toggleDark()">Dark Mode</button>
</header>

<div class="container">

  <div class="controls">
    <input type="text" id="search" placeholder="Search jobs...">
    <select id="category">
      <option value="All">All Categories</option>
      <option value="IT">IT</option>
      <option value="Marketing">Marketing</option>
      <option value="Finance">Finance</option>
    </select>
  </div>

  <div class="job-grid" id="jobGrid"></div>

  <div class="pagination" id="pagination"></div>

</div>

<!-- Apply Modal -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Apply Job</h3>
    <input type="text" id="name" placeholder="Your Name">
    <input type="email" id="email" placeholder="Your Email">
    <button onclick="submitApplication()">Submit</button>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script src="script.js">
</script>
</body>

</html>
